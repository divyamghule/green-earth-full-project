<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - GreenEarn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-panel">
      <h1>Welcome Back</h1>
      <p>Login to continue your GreenEarn journey.</p>
      <form id="loginForm" class="auth-form">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" />

        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" placeholder="******" />

        <button type="submit" class="btn primary">Login</button>
      </form>
      <p class="auth-link">New user? <a href="./register.html">Create account</a></p>
      <p class="auth-link"><a href="./index.html">Back to home</a></p>
      <div id="message" class="message"></div>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
